<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#151b2d"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="48px" fill="#ffffff" font-weight="bold">NEWS</text>
  <rect width="100%" height="100%" fill="url(#grid)" />
